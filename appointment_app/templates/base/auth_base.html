{% load static %}
<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WhatsApp Appointment OS — secure sign-in and account registration." />
    <title>{% block title %}WhatsApp Appointment OS{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="relative flex min-h-screen items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
      <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(96,165,250,0.14),_transparent_35%)]"></div>
      <div class="relative z-10 w-full max-w-6xl">
        <div class="grid gap-8 lg:grid-cols-[0.95fr_0.65fr]">
          <aside class="rounded-[2rem] border border-white/10 bg-slate-950/85 p-8 shadow-glass backdrop-blur-xl">
            {% block hero %}{% endblock %}
          </aside>
          <main class="rounded-[2rem] border border-white/10 bg-slate-950/85 p-8 shadow-glass backdrop-blur-xl">
            {% block auth_form %}{% endblock %}
          </main>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/lucide.min.js" defer></script>
    <script src="{% static 'js/theme-toggle.js' %}" defer></script>
    <script src="{% static 'js/alpine-config.js' %}" defer></script>
    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.store('theme').init();
      });
      document.addEventListener('DOMContentLoaded', () => {
        lucide.replace();
      });
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
