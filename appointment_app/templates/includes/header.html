{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" aria-label="Main navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
      <i class="bi bi-whatsapp me-2"></i>Appointment OS
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}" aria-current="{% if request.resolver_match.url_name == 'dashboard' %}page{% endif %}">
            <i class="bi bi-grid-fill me-1"></i>Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'appointments_list' %}active{% endif %}"
             href="{% url 'appointments_list' %}" aria-current="{% if request.resolver_match.url_name == 'appointments_list' %}page{% endif %}">
            <i class="bi bi-calendar-check me-1"></i>Appointments
            {% if pending_count %}<span class="badge badge-pending ms-1">{{ pending_count }}</span>{% endif %}
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'staff_list' %}active{% endif %}"
             href="{% url 'staff_list' %}" aria-current="{% if request.resolver_match.url_name == 'staff_list' %}page{% endif %}">
            <i class="bi bi-people-fill me-1"></i>Staff
          </a>
        </li>

        <li class="nav-item dropdown ms-lg-3">
          <a class="nav-link dropdown-toggle" href="#" role="button"
             data-bs-toggle="dropdown" aria-expanded="false" id="userMenuBtn">
            <i class="bi bi-person-circle me-1"></i>{{ user.username }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuBtn">
            <li>
              <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>
